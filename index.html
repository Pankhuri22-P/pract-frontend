<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List App</title>
</head>
<body>
    <div class="container">
        <h1>To-Do List</h1>
        <form id="taskForm">
            <label for="taskInput">Dont Add Task:</label>
            <input type="text" id="taskInput" required>
            <button type="submit">Add</button>
        </form>
        <ul id="taskList"></ul>
    </div>
</body>
</html>
